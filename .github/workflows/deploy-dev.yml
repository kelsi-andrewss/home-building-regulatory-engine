name: Deploy Dev

on:
  push:
    branches: [dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest backend/tests/ -v --ignore=backend/tests/test_ingestion.py --ignore=backend/tests/test_synthesis.py

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: TypeScript check
        working-directory: frontend
        run: npm ci && npx tsc -b --noEmit

  deploy-dev:
    needs: [test, typecheck]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: /api
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
        run: npm ci && npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Upload frontend to S3
        run: aws s3 sync frontend/dist s3://${{ secrets.DEV_PDF_BUCKET }}/deploys/frontend-dist --delete

      - name: Invalidate CloudFront cache
        run: |
          if [ -n "${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            aws cloudfront create-invalidation \
              --distribution-id "${{ secrets.DEV_CLOUDFRONT_DISTRIBUTION_ID }}" \
              --paths "/*"
          fi

      - name: Deploy backend via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.DEV_EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[\"export HOME=/root && mkdir -p /opt/app && cd /opt/app && (test -d repo/.git && echo 'Repo exists' || git clone https://github.com/kelsi-andrewss/home-building-regulatory-engine.git repo) && git config --global --add safe.directory /opt/app/repo && cd repo && git fetch origin && git checkout dev && git pull origin dev && cd /opt/app && rm -rf backend && cp -r repo/backend backend && cp repo/pyproject.toml . && cp repo/Dockerfile . && docker-compose build --no-cache backend && docker-compose up -d\"]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.DEV_EC2_INSTANCE_ID }}" || true

          STATUS=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.DEV_EC2_INSTANCE_ID }}" \
            --query "Status" --output text)

          echo "Deploy status: $STATUS"

          if [ "$STATUS" != "Success" ]; then
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "${{ secrets.DEV_EC2_INSTANCE_ID }}" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
